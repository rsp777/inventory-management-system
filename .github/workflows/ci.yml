name: CI

on:
  push:
    branches: [ main, migration/spring-boot ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build with Maven
        run: mvn -f InventoryManagementSystem/pom.xml -B -DskipTests package
      - name: Run tests
        run: mvn -f InventoryManagementSystem/pom.xml test