name: CI — Maven (maven wrapper)

on:
  push:
    branches: [ main, 'appmod/**', 'dev', 'demo' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run build and tests with Maven Wrapper
        working-directory: InventoryManagementSystem
        run: |
          chmod +x mvnw || true
          ./mvnw -B -ntp clean test
