# -----------------------------------------------------------------------
# WildFly / Jakarta EE runtime configuration
# Spring Boot-specific keys have been removed.
# Runtime configuration is managed via META-INF/microprofile-config.properties
# Datasource is managed via WildFly standalone.xml (JNDI: java:/InventoryDS)
# -----------------------------------------------------------------------

# Hibernate logging (read by logback.xml; kept here for reference)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Kafka properties (migration helper - mirror of microprofile config)
spring.kafka.bootstrap-servers=192.168.29.52:29092,192.168.29.52:29093,192.168.29.52:29094
spring.kafka.consumer.group-id=consumer_group5
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# Spring JPA / DataSource (migration from persistence.xml)
# Use JNDI datasource in app server: java:/InventoryDS
spring.datasource.jndi-name=java:/InventoryDS

# Do not auto-create schema (matches persistence.xml schema-generation=none)
spring.jpa.hibernate.ddl-auto=none

# Hibernate properties
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# When running in WildFly with JTA, keep the JTA platform mapping
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.JBossAppServerJtaPlatform

# Context path (replaces WEB-INF/jboss-web.xml context-root)
server.servlet.context-path=/inventory-management-system