# -----------------------------------------------------------------------
# MicroProfile Config — application runtime properties
# Loaded by WildFly's MicroProfile Config subsystem from the WAR archive.
# Override any value via environment variables or WildFly config sources.
# -----------------------------------------------------------------------

# ── Integration gateway ─────────────────────────────────────────────────
inventory.lookup.base-url=http://localhost:8085/

# ── Kafka topics ────────────────────────────────────────────────────────
cubiscan.to.wms.topic=WMS.ITEM.DATA.CUBISCAN
cubiscan.to.wms.realtime.unassignment.topic=WMS.ITEM.CUBISCAN.REALTIME.UNASSIGNMENT
wms.item.data.incoming=WMS.ITEM.DATA.INCOMING
kafka.topic.asn.incoming=WMS.ASN.DATA.INCOMING

# ── Kafka broker / consumer ─────────────────────────────────────────────
kafka.bootstrap.servers=192.168.29.52:29092,192.168.29.52:29093,192.168.29.52:29094
kafka.consumer.group.id=consumer_group5
kafka.consumer.auto.offset.reset=earliest
kafka.consumer.enable.auto.commit=false
kafka.consumer.delivery.mode=jms

# ── JMS bridge destinations ─────────────────────────────────────────────
jms.topic.lookup.prefix=java:/jms/topic/
